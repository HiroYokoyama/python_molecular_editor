name: Test pip install

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test (e.g. 4.1.4). Leave empty for latest."
        required: false
        type: string
        default: ""
      pypi_source:
        description: "Where to install from"
        required: true
        type: choice
        default: "PyPI"
        options:
          - PyPI
          - TestPyPI

permissions:
  contents: read

jobs:
  test-install:
    name: ${{ matrix.package }} / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # MoleditPy — Windows and macOS only (includes openbabel-wheel)
          - { package: MoleditPy, dist_name: moleditpy, os: windows-latest, python-version: "3.9" }
          - { package: MoleditPy, dist_name: moleditpy, os: windows-latest, python-version: "3.10" }
          - { package: MoleditPy, dist_name: moleditpy, os: windows-latest, python-version: "3.11" }
          - { package: MoleditPy, dist_name: moleditpy, os: windows-latest, python-version: "3.12" }
          - { package: MoleditPy, dist_name: moleditpy, os: windows-latest, python-version: "3.13" }
          - { package: MoleditPy, dist_name: moleditpy, os: windows-latest, python-version: "3.14" }
          - { package: MoleditPy, dist_name: moleditpy, os: macos-latest,   python-version: "3.9" }
          - { package: MoleditPy, dist_name: moleditpy, os: macos-latest,   python-version: "3.10" }
          - { package: MoleditPy, dist_name: moleditpy, os: macos-latest,   python-version: "3.11" }
          - { package: MoleditPy, dist_name: moleditpy, os: macos-latest,   python-version: "3.12" }
          - { package: MoleditPy, dist_name: moleditpy, os: macos-latest,   python-version: "3.13" }
          - { package: MoleditPy, dist_name: moleditpy, os: macos-latest,   python-version: "3.14" }
          # MoleditPy-linux — all platforms
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: ubuntu-latest,  python-version: "3.9" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: ubuntu-latest,  python-version: "3.10" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: ubuntu-latest,  python-version: "3.11" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: ubuntu-latest,  python-version: "3.12" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: ubuntu-latest,  python-version: "3.13" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: ubuntu-latest,  python-version: "3.14" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: windows-latest, python-version: "3.9" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: windows-latest, python-version: "3.10" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: windows-latest, python-version: "3.11" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: windows-latest, python-version: "3.12" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: windows-latest, python-version: "3.13" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: windows-latest, python-version: "3.14" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: macos-latest,   python-version: "3.9" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: macos-latest,   python-version: "3.10" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: macos-latest,   python-version: "3.11" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: macos-latest,   python-version: "3.12" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: macos-latest,   python-version: "3.13" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, os: macos-latest,   python-version: "3.14" }

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils xvfb libgl1-mesa-dri

      - name: Build install specifier
        id: pkg
        shell: bash
        run: |
          VER="${{ inputs.version }}"
          if [ -n "$VER" ]; then
            echo "spec=${{ matrix.package }}==$VER" >> "$GITHUB_OUTPUT"
          else
            echo "spec=${{ matrix.package }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build index flags
        id: idx
        shell: bash
        run: |
          if [ "${{ inputs.pypi_source }}" = "TestPyPI" ]; then
            echo "flags=--index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi

      - name: pip install ${{ matrix.package }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install ${{ steps.idx.outputs.flags }} "${{ steps.pkg.outputs.spec }}"

      - name: Smoke test
        run: |
          python -c "from importlib.metadata import version; print('${{ matrix.package }}', version('${{ matrix.dist_name }}'))"
