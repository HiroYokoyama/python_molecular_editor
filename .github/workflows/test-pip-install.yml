name: Test pip install

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to test (e.g. 4.1.4). Leave empty for latest."
        required: false
        type: string
        default: ""
      pypi_source:
        description: "Where to install from"
        required: true
        type: choice
        default: "PyPI"
        options:
          - PyPI
          - TestPyPI

permissions:
  contents: read

jobs:
  test-install:
    name: ${{ matrix.package }} / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # MoleditPy — Windows and macOS only (includes openbabel-wheel)
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: windows-latest, python-version: "3.9" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: windows-latest, python-version: "3.10" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: windows-latest, python-version: "3.11" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: windows-latest, python-version: "3.12" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: windows-latest, python-version: "3.13" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: windows-latest, python-version: "3.14" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: macos-latest,   python-version: "3.9" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: macos-latest,   python-version: "3.10" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: macos-latest,   python-version: "3.11" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: macos-latest,   python-version: "3.12" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: macos-latest,   python-version: "3.13" }
          - { package: MoleditPy, dist_name: moleditpy, module_name: moleditpy, os: macos-latest,   python-version: "3.14" }
          # MoleditPy-linux — all platforms
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: ubuntu-latest,  python-version: "3.9" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: ubuntu-latest,  python-version: "3.10" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: ubuntu-latest,  python-version: "3.11" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: ubuntu-latest,  python-version: "3.12" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: ubuntu-latest,  python-version: "3.13" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: ubuntu-latest,  python-version: "3.14" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: windows-latest, python-version: "3.9" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: windows-latest, python-version: "3.10" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: windows-latest, python-version: "3.11" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: windows-latest, python-version: "3.12" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: windows-latest, python-version: "3.13" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: windows-latest, python-version: "3.14" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: macos-latest,   python-version: "3.9" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: macos-latest,   python-version: "3.10" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: macos-latest,   python-version: "3.11" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: macos-latest,   python-version: "3.12" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: macos-latest,   python-version: "3.13" }
          - { package: MoleditPy-linux, dist_name: moleditpy-linux, module_name: moleditpy_linux, os: macos-latest,   python-version: "3.14" }

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils xvfb libgl1-mesa-dri

      - name: Build install specifier
        id: pkg
        shell: bash
        run: |
          VER="${{ inputs.version }}"
          if [ -n "$VER" ]; then
            echo "spec=${{ matrix.package }}==$VER" >> "$GITHUB_OUTPUT"
          else
            echo "spec=${{ matrix.package }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build index flags
        id: idx
        shell: bash
        run: |
          if [ "${{ inputs.pypi_source }}" = "TestPyPI" ]; then
            echo "flags=--index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi

      - name: pip install ${{ matrix.package }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install ${{ steps.idx.outputs.flags }} "${{ steps.pkg.outputs.spec }}"

      - name: E2E test
        shell: python
        run: |
          from importlib.metadata import version
          from ${{ matrix.module_name }}.core.molecular_data import MolecularData

          print("${{ matrix.package }}", version("${{ matrix.dist_name }}"))

          # Build a C-C-O molecule using plain tuples (no Qt needed)
          mol = MolecularData()
          c1 = mol.add_atom("C", (0.0, 0.0))
          c2 = mol.add_atom("C", (50.0, 0.0))
          o  = mol.add_atom("O", (100.0, 0.0))
          mol.add_bond(c1, c2, order=1)
          mol.add_bond(c2, o, order=1)

          assert len(mol.atoms) == 3, f"Expected 3 atoms, got {len(mol.atoms)}"
          assert len(mol.bonds) == 2, f"Expected 2 bonds, got {len(mol.bonds)}"

          block = mol.to_mol_block()
          assert block is not None, "to_mol_block() returned None"
          assert " C " in block, "Carbon missing from MOL block"
          assert " O " in block, "Oxygen missing from MOL block"

          print("E2E OK — MOL block roundtrip passed")
