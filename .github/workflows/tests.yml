name: MoleditPy Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils xvfb

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-qt pytest-mock pytest-timeout
        # Install local package + dependencies from pyproject.toml
        pip install -e moleditpy/

    - name: Run Tests
      env:
        MOLEDITPY_HEADLESS: "1"
        QT_QPA_PLATFORM: "offscreen"
      run: |
        # Run the unified test runner with --no-report to skip coverage generation in CI
        # xvfb-run is still good practice even with offscreen platform for some Qt internals
        xvfb-run python tests/run_all_tests.py --headless --unit --no-report
