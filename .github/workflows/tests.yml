name: MoleditPy Tests

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.14"

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }} on ${{ matrix.os }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install System Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils xvfb libgl1-mesa-dri

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-qt pytest-mock pytest-timeout
        # Install local package + dependencies from pyproject.toml
        pip install -e moleditpy/

    - name: Run Tests
      env:
        MOLEDITPY_HEADLESS: "1"
        QT_QPA_PLATFORM: "offscreen"
      run: |
        # Run unit, integration, and GUI suites in CI on dev branch
        python tests/run_all_tests.py --no-cov --no-report

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils xvfb libgl1-mesa-dri

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        # Install local package + dependencies from pyproject.toml
        pip install -e moleditpy/

    - name: Run Pylint
      run: |
        pylint moleditpy/src/moleditpy/ --errors-only
