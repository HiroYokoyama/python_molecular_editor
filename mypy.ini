[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True

[mypy-rdkit.*]
ignore_missing_imports = True

[mypy-vtk.*]
ignore_missing_imports = True

[mypy-vtkmodules.*]
ignore_missing_imports = True

[mypy-pyvista.*]
ignore_missing_imports = True

[mypy-pyvistaqt.*]
ignore_missing_imports = True
